<div id="delete-category-modal" class="bph-modal-overlay" style="padding: 16px;">
  <div class="bph-modal-box" style="max-width: 440px; width: 100%; padding: 32px 24px; position: relative;">
    
    <button type="button" onclick="closeDeleteModal()" class="absolute top-4 right-4 text-neutral-400 hover:text-neutral-600 transition-colors cursor-pointer bg-none border-none p-1 flex items-center justify-center rounded-lg">
      <span class="material-symbols-outlined" style="font-size: 20px;">close</span>
    </button>

    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-50 text-red-600 mb-4" style="border: none;">
      <span class="material-symbols-outlined" style="font-size: 24px;">delete_forever</span>
    </div>

    <div class="mb-6">
      <h3 class="text-lg font-bold text-neutral-900 tracking-tight" style="font-size: 18px;">Hapus Kategori</h3>
      <p class="text-sm text-neutral-400 mt-2 leading-relaxed" style="font-size: 14px; font-weight: 500;">
        Apakah Anda yakin ingin menghapus kategori <span id="delete-target-name" class="text-neutral-800 font-bold"></span>? Tindakan ini tidak dapat dibatalkan.
      </p>
    </div>

    <form id="delete-category-form" method="post" action="">
      {% csrf_token %}
      <div class="flex gap-3" style="display: flex; gap: 12px;">
        <button type="button" onclick="closeDeleteModal()" class="flex-1 py-2.5 px-4 rounded-xl border border-neutral-200 text-sm font-semibold text-neutral-600 hover:bg-neutral-50 transition-colors cursor-pointer bg-white" style="flex: 1; border-radius: 8px;">
          Batal
        </button>
        <button type="submit" class="flex-1 py-2.5 px-4 rounded-xl bg-red-600 hover:bg-red-700 text-sm font-bold text-white shadow-md shadow-red-600/10 active:scale-[0.98] transition-all cursor-pointer border-none" style="flex: 1; border-radius: 8px; background-color: #dc2626;"> 
          Hapus
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  const deleteModal = document.getElementById('delete-category-modal');
  const deleteForm = document.getElementById('delete-category-form');
  const deleteTargetName = document.getElementById('delete-target-name');

  function openDeleteModal(id, name) {
    if (!deleteModal || !deleteForm) return;
    
    deleteTargetName.innerText = name;
    
    // SINKRON URL: Menembak URL pattern DeleteView kategori lu
    deleteForm.action = `/be/categories/delete/${id}/`; 
    
    deleteModal.classList.add('active');
  }

  function closeDeleteModal() {
    if (deleteModal) {
      deleteModal.classList.remove('active');
    }
  }

  if(deleteModal) {
    deleteModal.addEventListener('click', function(e) {
      if (e.target === deleteModal) {
        closeDeleteModal();
      }
    });
  }
</script>
