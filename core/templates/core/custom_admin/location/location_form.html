{% extends "core/custom_admin/base.html" %}

{% block admin_content %}
<div class="mb-6 pt-2">
    <h2 class="text-xl font-bold text-emerald-900">{% if object %}Edit{% else %}Tambah{% endif %} Lokasi Wilayah</h2>
    <p class="text-xs text-gray-500 mt-1">Isi formulir data wilayah di bawah ini dengan lengkap.</p>
</div>

<!-- Form Tag Pembuka ditaruh di paling luar grid biar membungkus semua input -->
<form method="post" class="w-full">
    {% csrf_token %}

    <div class="flex gap-6 items-start">

        <!-- KOLOM KIRI: Field Utama (Tempat Input Nama & Slug) -->
        <div class="flex-1 space-y-5">
            <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nama Lokasi / Wilayah <span class="text-red-500">*</span></label>
                    {{ form.nama }}
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Slug <span class="text-red-500">*</span></label>
                    {{ form.slug }}
                    <p class="text-xs text-gray-400 mt-1">Slug otomatis terisi dari nama lokasi</p>
                </div>
            </div>
        </div>

        <!-- KOLOM KANAN: Sidebar Aksi (Tombol Batal & Simpan) -->
        <div class="w-72 space-y-5 flex-shrink-0">
            <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex gap-3">
                <a href="{% url 'location_list' %}" class="flex-1 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm text-center font-semibold hover:bg-gray-50 transition">Batal</a>
                <button type="submit" class="flex-1 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">Simpan</button>
            </div>
        </div>

    </div>
</form>

<style>
    /* Styling agar inputan Django default mengikuti desain Tailwind kita */
    form input[type="text"] {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
        color: #1e293b;
    }
    form input:focus {
        outline: none;
        border-color: #059669;
        box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.1);
    }
</style>
{% endblock %}
