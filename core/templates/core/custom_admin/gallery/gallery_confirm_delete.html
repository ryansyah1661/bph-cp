{% extends "core/custom_admin/base.html" %}

{% block admin_content %}
<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm max-w-md mx-auto text-center">
    <div class="text-red-500 mb-4">
        <span class="material-symbols-outlined text-5xl">delete_forever</span>
    </div>
    <h2 class="text-lg font-bold text-gray-800">Hapus Foto Galeri?</h2>
    <p class="text-sm text-gray-500 mt-2">Apakah Anda yakin ingin menghapus foto aksi lapangan dengan caption <span class="font-semibold text-red-600">"{{ object.caption }}"</span> secara permanen?</p>

    {% if object.gambar %}
        <div class="mt-4 max-w-xs mx-auto rounded-lg overflow-hidden border border-gray-100 shadow-sm">
            <img src="{{ object.gambar.url }}" class="w-full h-32 object-cover">
        </div>
    {% endif %}

    <form method="post" class="mt-6 flex justify-center space-x-3">
        {% csrf_token %}
        <a href="{% url 'gallery_admin_list' %}" class="px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-50 transition">Batal</a>
        <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-semibold hover:bg-red-700 transition">Ya, Hapus</button>
    </form>
</div>
{% endblock %}
