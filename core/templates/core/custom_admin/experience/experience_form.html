{% extends "core/custom_admin/base.html" %}

{% block admin_content %}
<div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm max-w-2xl mx-auto">
    <div class="border-b border-gray-100 pb-4 mb-6">
        <h2 class="text-xl font-bold text-emerald-900">{% if object %}Edit{% else %}Tambah{% endif %} Artikel</h2>
        <p class="text-xs text-gray-500 mt-1">Isi formulir di bawah ini dengan lengkap.</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-4">
        {% csrf_block %}
        {% csrf_token %}
        
        <div class="space-y-3 django-form-fields">
            {{ form.as_p }}
        </div>

        <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
            <a href="{% url 'project_list' %}" class="px-4 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm hover:bg-gray-50 transition">Batal</a>
            <button type="submit" class="px-5 py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">Simpan Data</button>
        </div>
    </form>
</div>

<style>
    /* Styling cepat biar form bawaan Django .as_p gak berantakan */
    .django-form-fields p { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .django-form-fields input[type="text"], .django-form-fields textarea, .django-form-fields select {
        width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;
    }
    .django-form-fields input:focus, .django-form-fields textarea:focus { outline: none; border-color: #059669; box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.1); }
    .django-form-fields label { font-size: 13px; font-weight: 600; color: #334155; }
</style>
{% endblock %}
