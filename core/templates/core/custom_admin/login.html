{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Panel - Bhumi Pasa Hijau</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* BANTAI WARNA BIRU AUTOFILL CHROME PADA INPUT */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #171717 !important;
            -webkit-box-shadow: 0 0 0px 1000px #f9fafb inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="bg-[#f4f7f4] min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-emerald-600/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-emerald-700/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.03)] border border-neutral-200/60 relative z-10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 overflow-hidden">
                <img src="{% static 'images/logo-bph.png' %}" alt="Logo BPH" class="w-14 h-14 object-contain">
            </div>
            <h2 class="text-2xl font-extrabold text-neutral-900 tracking-tight">
                BPH Admin Panel
            </h2>
            <p class="mt-1.5 text-sm text-neutral-500 font-medium">
                Silakan login untuk mengelola konten website
            </p>
        </div>

        <form class="space-y-5" method="POST" autocomplete="off">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-xs font-bold uppercase tracking-wider text-neutral-700 mb-1.5">Username</label>
                    <div class="relative">
                        <input id="id_username" name="username" type="text" required 
                               class="block w-full px-4 py-3 rounded-xl border border-neutral-300 text-neutral-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600/20 focus:border-emerald-600 bg-neutral-50/30 transition-all placeholder-neutral-400 font-medium" 
                               placeholder="Masukkan username" autocomplete="off">
                    </div>
                </div>
                
                <div>
                    <label for="id_password" class="block text-xs font-bold uppercase tracking-wider text-neutral-700 mb-1.5">Password</label>
                    <div class="relative flex items-center bg-neutral-50/30 rounded-xl border border-neutral-300 focus-within:ring-2 focus-within:ring-emerald-600/20 focus-within:border-emerald-600 transition-all">
                        <input id="id_password" name="password" type="password" required 
                               class="block w-full pr-12 h-11 px-4 py-3 bg-transparent text-neutral-900 text-sm focus:outline-none placeholder-neutral-400 font-medium rounded-xl" 
                               placeholder="••••••••" autocomplete="new-password">
                        <button type="button" id="toggle-password-btn" class="absolute right-3 text-neutral-400 select-none cursor-pointer flex items-center justify-center p-1 rounded-lg transition-colors">
                            <span class="material-symbols-outlined" id="password-eye-icon" style="font-size: 20px;">visibility</span>
                        </button>
                    </div>
                </div>
            </div>

            {% if form.errors %}
            <div class="text-red-600 text-xs font-semibold text-center bg-red-50 border border-red-100 py-2.5 px-3 rounded-xl animate-shake">
                Username atau password salah, Harap periksa kembali!
            </div>
            {% endif %}

            <div class="pt-2">
                <button type="submit" 
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-600/20 active:scale-[0.99] transition-all shadow-md shadow-emerald-600/10 cursor-pointer">
                    Masuk ke Dashboard
                </button>
            </div>
        </form>

        <p class="text-center text-xs text-neutral-400 font-medium mt-8">
            &copy; 2026 Bhumi Pasa Hijau. All rights reserved.
        </p>
    </div>

    <script>
        const passwordInput = document.getElementById('id_password');
        const togglePasswordBtn = document.getElementById('toggle-password-btn');
        const eyeIcon = document.getElementById('password-eye-icon');

        // Reset paksa state class di awal agar terhindar dari trigger autofill browser
        togglePasswordBtn.className = "absolute right-3 text-neutral-400 select-none cursor-pointer flex items-center justify-center p-1 rounded-lg transition-colors";

        togglePasswordBtn.addEventListener('click', function () {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off'; // Ubah ikon jadi mata dicoret
                
                // HANYA IJO KALO SEDANG DI-CLICK AKTIF (SHOW STATE)
                togglePasswordBtn.classList.remove('text-neutral-400');
                togglePasswordBtn.classList.add('text-emerald-600');
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility'; // Kembalikan ke ikon mata biasa
                
                // BALIK ABU-ABU SEPERTI SEMULA (HIDE STATE)
                togglePasswordBtn.classList.remove('text-emerald-600');
                togglePasswordBtn.classList.add('text-neutral-400');
            }
        });
    </script>
</body>
</html>
