{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Panel - Bhumi Pasa Hijau</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#f4f7f4] min-h-screen flex items-center justify-center px-4 relative overflow-hidden">
    
    <!-- Elemen Dekorasi Background Lingkaran -->
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-emerald-600/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-20 -right-20 w-80 h-80 bg-emerald-700/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.03)] border border-neutral-200/60 relative z-10">
        
        <!-- Header Logo & Judul -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-50 text-emerald-600 rounded-xl mb-4 shadow-sm border border-emerald-100">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-7 h-7">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h2 class="text-2xl font-extrabold text-neutral-900 tracking-tight">
                BPH Admin Panel
            </h2>
            <p class="mt-1.5 text-sm text-neutral-500 font-medium">
                Silakan login untuk mengelola konten website
            </p>
        </div>

        <!-- Form Elemen -->
        <form class="space-y-5" method="POST">
            {% csrf_token %}
            
            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-xs font-bold uppercase tracking-wider text-neutral-700 mb-1.5">Username</label>
                    <div class="relative">
                        <input id="id_username" name="username" type="text" required 
                               class="block w-full px-4 py-3 rounded-xl border border-neutral-300 text-neutral-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600/20 focus:border-emerald-600 bg-neutral-50/30 transition-all placeholder-neutral-400 font-medium" 
                               placeholder="Masukkan username">
                    </div>
                </div>
                
                <div>
                    <label for="id_password" class="block text-xs font-bold uppercase tracking-wider text-neutral-700 mb-1.5">Password</label>
                    <div class="relative">
                        <input id="id_password" name="password" type="password" required 
                               class="block w-full px-4 py-3 rounded-xl border border-neutral-300 text-neutral-900 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-600/20 focus:border-emerald-600 bg-neutral-50/30 transition-all placeholder-neutral-400 font-medium" 
                               placeholder="••••••••">
                    </div>
                </div>
            </div>

            <!-- Pesan Error Gagal Login -->
            {% if form.errors %}
            <div class="text-red-600 text-xs font-semibold text-center bg-red-50 border border-red-100 py-2.5 px-3 rounded-xl animate-shake">
                Username atau password salah, Syauqi!
            </div>
            {% endif %}

            <!-- Tombol Submit -->
            <div class="pt-2">
                <button type="submit" 
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-600/20 active:scale-[0.99] transition-all shadow-md shadow-emerald-600/10 cursor-pointer">
                    Masuk ke Dashboard
                </button>
            </div>
        </form>

        <!-- Footer Hak Cipta -->
        <p class="text-center text-xs text-neutral-400 font-medium mt-8">
            &copy; 2026 Bhumi Pasa Hijau. All rights reserved.
        </p>
    </div>
</body>
</html>
