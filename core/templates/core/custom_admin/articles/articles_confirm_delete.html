{% extends "core/custom_admin/base.html" %}

{% block admin_content %}
<div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-sm max-w-md mx-auto text-center">
  <div class="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-100 shadow-sm text-rose-500">
    <span class="material-symbols-outlined text-4xl">delete_forever</span>
  </div>
  
  <h2 class="text-xl font-bold text-gray-800">Hapus Artikel?</h2>
  <p class="text-sm text-gray-500 mt-2 leading-relaxed">Apakah lu yakin ingin menghapus artikel <span class="font-semibold text-rose-600">"{{ object.judul }}"</span> secara permanen? Tindakan ini tidak bisa dibatalkan.</p>

  <form method="post" class="mt-6 flex justify-center space-x-3">
    {% csrf_token %}
    <a href="{% url 'article_list' %}" class="flex-1 px-4 py-2 border border-gray-200 text-gray-600 rounded-xl text-sm font-semibold hover:bg-gray-50 text-center transition">Batal</a>
    <button type="submit" class="flex-1 px-4 py-2 bg-rose-600 text-white rounded-xl text-sm font-semibold hover:bg-rose-700 transition shadow-sm shadow-rose-100">Ya, Hapus</button>
  </form>
</div>
{% endblock %}
