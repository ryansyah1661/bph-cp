<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | Bhumi Pasa Hijau</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="bg-white p-8 rounded-2xl border border-gray-100 shadow-xl max-w-md w-full text-center space-y-6">
        <div>
            <h2 class="text-2xl font-extrabold text-emerald-900 tracking-wide">Pemulihan Password</h2>
            <p class="text-xs text-gray-400 mt-2">Masukkan alamat email akun Anda. Sistem akan mengirimkan tautan untuk membuat password baru.</p>
        </div>

        <form method="post" class="space-y-4 text-left">
            {% csrf_token %}
            <div>
                <label for="id_email" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Alamat Email</label>
                <input type="email" name="email" id="id_email" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-emerald-500 text-sm transition"
                       placeholder="Masukkan alamat email Anda">
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition cursor-pointer text-sm shadow-md">
                Kirim Tautan Pemulihan
            </button>
        </form>

        <div class="text-center pt-2">
            <a href="{% url 'admin_login' %}" class="text-xs font-semibold text-emerald-700 hover:text-emerald-800 transition">
                &larr; Kembali ke Halaman Login
            </a>
        </div>
    </div>

</body>
</html>
