<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Pemulihan Terkirim | Bhumi Pasa Hijau</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div class="bg-white p-10 rounded-2xl border border-gray-100 shadow-xl max-w-md w-full text-center space-y-6">
        <div class="inline-flex items-center justify-center bg-emerald-50 text-emerald-600 p-4 rounded-full border border-emerald-100 shadow-sm">
            <span class="material-symbols-outlined text-4xl">mark_email_read</span>
        </div>

        <div>
            <h2 class="text-xl font-extrabold text-slate-900 tracking-wide">Periksa Email Anda</h2>
            <p class="text-sm text-slate-500 mt-3 leading-relaxed">Kami telah mengirimkan instruksi beserta tautan perubahan password ke email Anda. Silakan periksa kotak masuk atau folder spam.</p>
        </div>

        <div class="bg-slate-50 border border-slate-100 p-4 rounded-xl text-xs text-slate-500 leading-normal">
            Belum menerima email pemulihan? 
            <a href="{% url 'password_reset' %}" class="block mt-2 font-bold text-emerald-700 hover:text-emerald-800 transition underline decoration-2">
                Kirim Ulang Tautan
            </a>
        </div>

        <div class="pt-2">
            <a href="{% url 'admin_login' %}" class="text-xs font-semibold text-gray-400 hover:text-slate-600 transition">
                Kembali ke Login
            </a>
        </div>
    </div>

</body>
</html>
